<style>
    :root {
        --fontkit-text-font: "Aleo", "FZNewShuSong", "Zen Old Mincho", "Chiron Sung HK", "Noto Serif SC", serif;
        --fontkit-code-font: "Fira Code", "Cascadia Code", "Consolas", "Inconsolata", "Menlo", "Monaco", "SF Mono", "Ubuntu Mono", "DejaVu Sans Mono", "Courier New", monospace;
        --md-code-font: var(--fontkit-code-font);
        --md-text-font: var(--fontkit-text-font);
    }

    * {
        font-variant-ligatures: contextual;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    html {
        scroll-behavior: smooth;
        hyphens: auto;
        overflow-wrap: break-word;
        text-rendering: optimizeLegibility;
        font-kerning: normal;
    }

    .md-typeset img,
    .md-typeset .glightbox img {
        display: block;
        margin: 0 auto;
    }

    .md-typeset div.arithmatex {
        overflow: hidden !important;
    }

    .md-typeset div.arithmatex .katex-display {
        margin-top: 0.1em !important;
        margin-bottom: 0.1em !important;
    }

    .md-typeset__table {
        display: block !important;
    }

    .md-typeset table:not(.highlighttable) {
        display: table !important;
    }

    .md-typeset table:not([class]) th {
        min-width: 0rem;
    }

    .recently-updated {
        font-family: var(--md-text-font) !important;
    }

    /* h1, */
    h2,
    h3 {
        text-align: center;
    }

    @media print {
        .not-printable {
            display: none !important;
        }

        h1 {
            text-align: center;
        }

        .md-typeset .grid {
            grid-template-columns: 1fr 1fr !important;
        }

        a {
            text-decoration: underline !important;
        }
    }

    no-wrap,
    .no-wrap {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        word-break: keep-all;
    }

    .md-typeset .Box-body {
        overflow: hidden !important;
    }

    .md-typeset .math.inline,
    .md-typeset .math.math-inline {
        margin-right: auto;
        float: none;
    }
</style>

<script defer="" src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
<script defer="" src="https://cdn.jsdelivr.net/npm/katex@latest/dist/contrib/copy-tex.min.js"></script>
<script defer="" src="https://cdn.jsdelivr.net/npm/katex@latest/dist/contrib/mhchem.min.js"></script>
<script defer="" src="https://cdn.jsdelivr.net/npm/katex@latest/dist/contrib/render-a11y-string.min.js"></script>
{% raw %}
<script>
    document.addEventListener("DOMContentLoaded", function () {
        var mathElements = document.getElementsByClassName("math");
        var macros = {
            "\\RR": "\\mathbb{R}",
            "\\i": "\\mathrm{i}",
            "\\d": "\\mathrm{d}",
            "\\C": "\\mathbb{C}",
            "\\R": "\\mathbb{R}",
            "\\Q": "\\mathbb{Q}",
            "\\Z": "\\mathbb{Z}",
            "\\N": "\\mathbb{N}",
            "\\P": "\\mathbb{P}",
            "\\degree": "^\\circ",
            "\\rank": "\\operatorname{rank}",
            "\\op": "\\operatorname",
            "\\paren": "\\left({#1}\\right)",
            "\\bracket": "\\left[{#1}\\right]",
            "\\brace": "\\left\\{{#1}\\right\\}",
            "\\ceil": "\\left\\lceil{#1}\\right\\rceil",
            "\\floor": "\\left\\lfloor{#1}\\right\\rfloor",
            "\\vert": "\\left\\lvert{#1}\\right\\rvert",
            "\\vec": "\\bm",
            "\\vecc": "\\overrightarrow",
            "\\poly": "\\ce{-\\!\\!\\![ #1 ]_n\\!\\!\\!\\!\\!-}",
            "\\el": "#1\\mathrm{#2}^{#3}",
            "\\pH": "p\\ce{H}",
            "\\pOH": "p\\ce{OH}",
            "\\con": "\\left[\\ce{#1}\\right]",
            "\\val": "\\overset{#2}{\\ce{#1}}",
            "’": "'",
            "，": ",",
            "。": ".",
            "；": ";",
            "：": ":",
            "！": "!",
            "？": "?",
            "【": "[",
            "】": "]",
            "（": "(",
            "）": ")",
            "、": ",",
            "—": "-",
            "…": "\\dots",
            "·": "\\cdot",
            "->": "\\to",
            "<-": "\\gets",
        };
        for (var i = 0; i < mathElements.length; i++) {
            var texText = mathElements[i].firstChild;
            if (mathElements[i].tagName == "SPAN") {
                katex.render(texText.data, mathElements[i], {
                    displayMode: mathElements[i].classList.contains("display"),
                    throwOnError: false,
                    macros: macros,
                    fleqn: false,
                });
            }
        }
    });
</script>
{% endraw %}
