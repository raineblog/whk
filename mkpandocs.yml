pandoc:
  format: markdown+abbreviations+alerts-all_symbols_escapable+angle_brackets_escapable+autolink_bare_uris-blank_before_blockquote-citations+east_asian_line_breaks+emoji-grid_tables+lists_without_preceding_blankline+mark+markdown_attribute
  to: html5
  html_parser: lxml
  
  lua_filters:
    - filters/admonition.lua
  args:
    - --wrap=none
    - --syntax-highlighting=tango
    - --katex
    - --strip-comments=false

