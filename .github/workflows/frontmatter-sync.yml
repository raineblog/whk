name: Frontmatter AI Sync
on:
  schedule:
    # 每周日凌晨运行 (处理过去 7 天更新的文件)
    - cron: '0 0 * * 0'
    # 每月 1 号凌晨运行 (补全缺失 Frontmatter 的文件)
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '选择运行模式'
        required: true
        default: 'days-7'
        type: choice
        options:
          - 'days-7'
          - 'new'
          - 'clean-new'
      file_path:
        description: '特异性处理文件路径 (仅在手动触发时可选)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  sync_metadata:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 完整克隆以支持 git 日志扫描
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Determine Process Flag
        id: flags
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.mode }}"
            FILE="${{ github.event.inputs.file_path }}"
            if [[ -n "$FILE" ]]; then
              echo "EXEC_FLAG=--file $FILE" >> $GITHUB_OUTPUT
            elif [[ "$MODE" == "days-7" ]]; then
              echo "EXEC_FLAG=--days 7" >> $GITHUB_OUTPUT
            elif [[ "$MODE" == "new" ]]; then
              echo "EXEC_FLAG=--new" >> $GITHUB_OUTPUT
            elif [[ "$MODE" == "clean-new" ]]; then
              echo "EXEC_FLAG=--clean-new" >> $GITHUB_OUTPUT
            fi
          elif [[ "${{ github.event.schedule }}" == "0 0 * * 0" ]]; then
            echo "EXEC_FLAG=--days 7" >> $GITHUB_OUTPUT
          else
            echo "EXEC_FLAG=--new" >> $GITHUB_OUTPUT
          fi

      - name: Execute Frontmatter Generator
        run: node scripts/generate_frontmatter.js ${{ steps.flags.outputs.EXEC_FLAG }}
        env:
          SILICONFLOW_API: ${{ secrets.SILICONFLOW_API }}
          CI: true

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "没有发现 Frontmatter 变更，跳过提交。"
          else
            git commit -m "chore: 自动化同步 AI 元数据 (Mode: ${{ steps.flags.outputs.EXEC_FLAG }})"
            git push origin main
          fi
