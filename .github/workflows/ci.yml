name: Build and Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install bun dependencies
        run: bun install

      - name: Install uv dependencies
        run: uv sync --locked --no-dev

      - name: Install pandoc
        uses: pandoc/actions/setup@v1

      - name: Cache
        uses: actions/cache@v6
        with:
          path: .cache
          key: ${{ runner.os }}-mkdocs-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-mkdocs-

      - name: Build Static Site
        run: uv run --no-sync scripts/generate.py --build --site_url=https://raineblog.dpdns.org/whk/ --disable_giscus=false
        env:
          PYTHONUNBUFFERED: 1
          PYTHONUTF8: 1
          NO_MKDOCS_2_WARNING: 1

      - name: Build Bun Executable
        run: bun build --compile --minify --bytecode build.ts --outfile build-bin

      - name: Bun Post-processing
        run: ./build-bin --dir site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: site
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
