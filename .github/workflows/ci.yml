name: CI/CD Pipeline

on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  packages: read
  id-token: write

jobs:
  build:
    name: Build and Deploy to ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Github Pages
            cache: mkdocs
            url: https://raineblog.dpdns.org/whk/
            branch: gh-pages
            disable_giscus: 'false'
          - name: Cloudflare Pages
            cache: mkdocs
            url: https://raineblog-whk.pages.dev/
            branch: cloudflare-pages
            disable_giscus: 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          uv sync --locked

      - name: Cache
        uses: actions/cache@v5
        with:
          path: .cache
          key: ${{ runner.os }}-${{ matrix.cache }}-2-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.cache }}-2-

      - name: Build Static Site
        run: uv run scripts/generate.py --build --site_url=${{ matrix.url }} --disable_giscus=${{ matrix.disable_giscus }}
        env:
          PYTHONUNBUFFERED: 1
          NO_MKDOCS_2_WARNING: 1

      - name: Determine Deployment
        id: deploy_check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]] \
             || [[ "${{ github.event_name }}" == "schedule" ]] \
             || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi
  
      - name: Push to Branch
        if: steps.deploy_check.outputs.should_deploy == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: ${{ matrix.branch }}
          publish_dir: site
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          full_commit_message: "Deploying to ${{ matrix.branch }} from ${{ github.sha }}"

      - name: Upload Artifact
        if: steps.deploy_check.outputs.should_deploy == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: site-${{ matrix.branch }}
          path: site
