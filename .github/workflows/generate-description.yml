name: Generate Description

on:
  schedule:
    - cron: 0 1 * * *
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "generate-description"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-description:
    name: Generate Description
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install uv dependencies
        run: uv sync --locked --no-dev

      - name: Cache
        uses: actions/cache@v6
        with:
          path: .cache
          key: ${{ runner.os }}-mkdocs-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-mkdocs-

      - name: Run Description Generation Script
        run: uv run --no-sync scripts/generate_description/main.py
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          PYTHONUNBUFFERED: 1
          PYTHONUTF8: 1

      - name: Commit and Push Description DB
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add description_cache.json
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update description cache [skip ci]"
            git push origin main
          fi