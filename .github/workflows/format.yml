name: Auto format check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-markdownlint-cli2:
    name: Check markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
      - run: npx -y markdownlint-cli2 "docs/**/*.md"
