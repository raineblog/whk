name: Maintain Pipeline

on:
  schedule:
    # 每周日凌晨运行 (SEO Push + Frontmatter 同步 + Autoblog 更新)
    - cron: '0 0 * * 0'
    # 每月 1 号凌晨运行 (补全缺失 Frontmatter 的文件)
    - cron: '0 0 1 * *'

concurrency:
  group: "maintain"
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  packages: read
  id-token: write
  issues: write

jobs:
  seo-push:
    name: SEO Push
    if: github.event.schedule == '0 0 * * 0'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/raineblog/mkdocs-seo:latest
    steps:
      - name: SEO Push
        run: seo-push
        env:
          SITE_HOST: "raineblog.dpdns.org"
          SITE_BASE: "https://raineblog.dpdns.org"
          SITE_NAME: "RainPPR's WHK Wiki"
          SITE_PROJECT: "whk"
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

